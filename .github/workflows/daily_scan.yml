name: Daily CAC40 PQC Scan

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6:00 UTC (8:00 Paris)
  workflow_dispatch:  # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check OpenSSL version
        run: |
          openssl version
          python3 -c "import ssl; print(f'Python SSL: {ssl.OPENSSL_VERSION}')"

      - name: Run CAC40 scan
        run: python scan_cac40.py

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cac40_results.json
          git diff --cached --quiet || git commit -m "Daily CAC40 PQC scan $(date -u +%Y-%m-%d)"
          git push
